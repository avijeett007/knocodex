<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#0c0c0c" stroke="#0073ff" stroke-width="4" />
  
  <!-- Code Brackets -->
  <path d="M60,70 L40,100 L60,130" fill="none" stroke="#0073ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M140,70 L160,100 L140,130" fill="none" stroke="#0073ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- AI Brain Circuit Pattern -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#0073ff" stroke-width="3" />
  <circle cx="100" cy="100" r="15" fill="#0073ff" opacity="0.6" />
  
  <!-- Circuit Lines -->
  <line x1="70" y1="100" x2="85" y2="100" stroke="#0073ff" stroke-width="3" />
  <line x1="115" y1="100" x2="130" y2="100" stroke="#0073ff" stroke-width="3" />
  <line x1="100" y1="70" x2="100" y2="85" stroke="#0073ff" stroke-width="3" />
  <line x1="100" y1="115" x2="100" y2="130" stroke="#0073ff" stroke-width="3" />
  
  <!-- Circuit Nodes -->
  <circle cx="70" cy="100" r="4" fill="#0073ff" />
  <circle cx="130" cy="100" r="4" fill="#0073ff" />
  <circle cx="100" cy="70" r="4" fill="#0073ff" />
  <circle cx="100" cy="130" r="4" fill="#0073ff" />
  
  <!-- Diagonal Circuit Lines -->
  <line x1="80" y1="80" x2="90" y2="90" stroke="#0073ff" stroke-width="2" />
  <line x1="120" y1="80" x2="110" y2="90" stroke="#0073ff" stroke-width="2" />
  <line x1="80" y1="120" x2="90" y2="110" stroke="#0073ff" stroke-width="2" />
  <line x1="120" y1="120" x2="110" y2="110" stroke="#0073ff" stroke-width="2" />
  
  <!-- Diagonal Circuit Nodes -->
  <circle cx="80" cy="80" r="3" fill="#0073ff" />
  <circle cx="120" cy="80" r="3" fill="#0073ff" />
  <circle cx="80" cy="120" r="3" fill="#0073ff" />
  <circle cx="120" cy="120" r="3" fill="#0073ff" />
  
  <!-- Pulse Animation -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#0073ff" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="50;60;50" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
